name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Go ──
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Go build
        run: go build ./...

      - name: Go vet
        run: go vet ./...

      # ── React ──
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: React build
        working-directory: web
        run: |
          npm ci
          npm run build

  # ── Integration (manual — needs internal network) ──
